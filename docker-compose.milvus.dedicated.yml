services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: slc_phase2_etcd_dedicated
    command: etcd -advertise-client-urls=http://127.0.0.1:2389 -listen-client-urls http://0.0.0.0:2389 --data-dir /etcd
    volumes:
      - ./storage/milvus_dedicated/etcd:/etcd

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: slc_phase2_minio_dedicated
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - ./storage/milvus_dedicated/minio:/minio_data

  milvus:
    image: milvusdb/milvus:v2.5.15
    container_name: slc_phase2_milvus_dedicated
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2389
      MINIO_ADDRESS: minio:9000
    ports:
      - "19531:19530"
      - "9092:9091"
    volumes:
      - ./storage/milvus_dedicated/data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
