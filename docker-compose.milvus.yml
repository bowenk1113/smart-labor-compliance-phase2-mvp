services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: slc_phase2_etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - ./storage/milvus/etcd:/etcd

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: slc_phase2_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./storage/milvus/minio:/minio_data

  milvus:
    image: milvusdb/milvus:v2.5.15
    container_name: slc_phase2_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - ./storage/milvus/data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
